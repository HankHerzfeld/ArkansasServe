<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Event — Arkansas Serve</title>
  <meta name="description" content="Event details and volunteer sign-up on Arkansas Serve.">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2d6a4f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

<div id="app-header"></div>

<div class="container">
  <p style="margin-bottom:1rem;"><a href="/events.html" style="font-size:.9rem;">← Back to events</a></p>

  <div id="event-loading" class="loading-state"><div class="spinner"></div><p>Loading event…</p></div>
  <div id="event-error" class="card" style="display:none;text-align:center;color:var(--gray-600);"></div>
  <div id="event-detail" style="display:none;"></div>
</div>

<!-- Sign-up confirmation modal -->
<div class="modal-overlay" id="signup-modal">
  <div class="modal">
    <div class="modal-title" id="modal-event-title">Sign Up for Event</div>
    <p id="modal-event-details" style="color:var(--gray-600);font-size:.9rem;margin-bottom:.5rem;"></p>
    <div id="signup-fields" style="margin:.5rem 0;"></div>
    <p style="font-size:.9rem;">You'll receive a notification once your attendance is recorded and your hours are approved.</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Confirm Sign-Up</button>
    </div>
  </div>
</div>

<!-- Group registration (EventAdmin+). Wider than the standard modal because the answers
     step is a person x question grid; it still obeys the same width/height caps below. -->
<div class="modal-overlay" id="group-modal">
  <!-- Wider than the 520px default because step 2 is a person x question grid. Keeps the
       shared 92vw mobile cap, so it matches every other dialog on a phone and inherits
       .modal's max-height/scroll rather than growing past the frame. -->
  <div class="modal" style="width:min(92vw,760px);">
    <div class="modal-title" id="group-modal-title">Register a group</div>
    <p id="group-modal-details" style="color:var(--gray-600);font-size:.9rem;margin-bottom:.5rem;"></p>
    <div id="group-fields" style="margin:.5rem 0;"></div>
    <div id="group-error" class="alert alert-error" style="display:none;margin-top:.5rem;"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="group-cancel">Cancel</button>
      <button class="btn btn-secondary" id="group-back" style="display:none;">Back</button>
      <button class="btn btn-primary" id="group-next">Next</button>
      <button class="btn btn-primary" id="group-confirm" style="display:none;">Register group</button>
    </div>
  </div>
</div>

<script src="/js/vendor/msal-browser.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/scope.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/pages/event.js"></script>
</body>
</html>
