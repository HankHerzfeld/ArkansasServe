<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Events — Arkansas Serve</title>
  <meta name="description" content="Find and sign up for volunteer events in your community on Arkansas Serve.">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2d6a4f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

<div id="app-header"></div>

<div class="container">
  <div class="page-header">
    <h1>Upcoming Events</h1>
    <p>Find volunteer opportunities in your community.</p>
    <div id="role-actions" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;"></div>
  </div>

  <!-- Filter bar -->
  <div class="card" style="padding:.75rem 1rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
    <input type="search" id="filter-search" placeholder="Search by name or organization…" aria-label="Search events by name or organization"
      style="flex:1;min-width:200px;padding:.45rem .75rem;border:1px solid var(--gray-400);border-radius:var(--radius);font-size:.9rem;">
    <select id="filter-category" aria-label="Filter events by category" style="padding:.45rem .75rem;border:1px solid var(--gray-400);border-radius:var(--radius);font-size:.9rem;">
      <option value="">All categories</option>
      <option>Environmental</option>
      <option>Food Bank</option>
      <option>Tutoring</option>
      <option>Animal Shelter</option>
      <option>Senior Care</option>
      <option>Other</option>
    </select>
  </div>

  <!-- Loading / empty / grid -->
  <div id="events-loading" class="loading-state"><div class="spinner"></div><p>Loading events…</p></div>
  <div id="events-empty" class="card" style="display:none;text-align:center;color:var(--gray-600);">
    No upcoming events found. Check back soon!
  </div>
  <div class="event-grid" id="events-grid" style="display:none;"></div>

  <!-- Search index (never shown).
       Events stay CARDS — a card carries the image, date, org and spare places far better
       than a table row for someone browsing opportunities. But the search itself needs to
       cope with many options, so DataTables indexes this hidden mirror of the events and
       the grid above renders whatever survives the filter. DataTables is the engine here,
       not the view: no pager, no ordering, nothing rendered. -->
  <table id="events-index" style="display:none;" aria-hidden="true">
    <thead>
      <tr><th>Title</th><th>Organization</th><th>Category</th><th>Location</th></tr>
    </thead>
    <tbody id="events-index-body"></tbody>
  </table>
</div>

<!-- Sign-up confirmation modal -->
<div class="modal-overlay" id="signup-modal">
  <div class="modal">
    <div class="modal-title" id="modal-event-title">Sign Up for Event</div>
    <p id="modal-event-details" style="color:var(--gray-600);font-size:.9rem;margin-bottom:.5rem;"></p>
    <p style="font-size:.9rem;">You'll receive a notification once your attendance is recorded and your hours are approved by your school.</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Confirm Sign-Up</button>
    </div>
  </div>
</div>

<script src="/js/vendor/msal-browser.min.js"></script>
<!-- DataTables powers event SEARCH only (see the #events-index table above); the grid
     stays cards. Vendored because the CSP allows script-src 'self'. -->
<script src="/js/vendor/jquery.min.js"></script>
<script src="/js/vendor/dataTables.min.js"></script>
<script src="/js/vendor/dataTables.dataTables.min.js"></script>
<script src="/js/datatables.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/scope.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/pages/events.js"></script>
</body>
</html>
