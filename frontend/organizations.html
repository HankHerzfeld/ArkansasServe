<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Organizations — Arkansas Serve</title>
  <meta name="description" content="Browse organizations and join the ones you volunteer with on Arkansas Serve.">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#008b48">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/favicon/favicon-16.png">
  <link rel="apple-touch-icon" href="/assets/brand/favicon/apple-touch-180.png">
</head>
<body>

<div id="app-header"></div>

<div class="container">
  <div class="page-header">
    <h1>Organizations</h1>
    <p>Browse organizations and join the ones you volunteer with.</p>
    <div id="role-actions" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;"></div>
  </div>

  <!-- Filter bar -->
  <div class="card" style="padding:.75rem 1rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
    <input type="search" id="filter-search" placeholder="Search organizations…" aria-label="Search organizations by name"
      style="flex:1;min-width:200px;padding:.45rem .75rem;border:1px solid var(--gray-400);border-radius:var(--radius);font-size:.9rem;">
    <label style="font-size:.85rem;color:var(--gray-600);display:flex;align-items:center;gap:.35rem;">
      <input type="checkbox" id="filter-mine"> My organizations only
    </label>
  </div>

  <!-- Loading / empty / grid -->
  <div id="orgs-loading" class="loading-state"><div class="spinner"></div><p>Loading organizations…</p></div>
  <div id="orgs-empty" class="card" style="display:none;text-align:center;color:var(--gray-600);">
    No organizations found.
  </div>
  <div class="event-grid" id="orgs-grid" style="display:none;"></div>
</div>

<script src="/js/vendor/msal-browser.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/scope.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/pages/organizations.js"></script>
</body>
</html>
