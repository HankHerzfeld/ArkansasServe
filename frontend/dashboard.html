<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard — Arkansas Serve</title>
  <meta name="description" content="Track and manage community service hours for Arkansas schools, organizations, and volunteers.">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2d6a4f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

<div id="app-header"></div>

<div class="container">
  <div class="page-header">
    <h1 id="greeting">My Dashboard</h1>
    <p>Track your community service hours and upcoming events.</p>
    <div id="scope-bar" style="margin-top:.5rem;"></div>
  </div>

  <!-- Profile -->
  <div class="card" id="profile-card" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;">
      <div style="display:flex;gap:1rem;align-items:center;">
        <div id="profile-avatar" style="width:3rem;height:3rem;border-radius:50%;background:var(--green-pale);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;flex-shrink:0;"></div>
        <div>
          <div id="profile-name" style="font-weight:600;font-size:1.1rem;"></div>
          <div id="profile-email" style="font-size:.85rem;color:var(--gray-600);"></div>
          <div id="profile-level" style="margin-top:.35rem;"></div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" id="btn-edit-profile" style="display:none;">Edit profile</button>
    </div>
    <div id="profile-details" style="display:flex;gap:1.75rem;flex-wrap:wrap;margin-top:1rem;font-size:.9rem;"></div>
    <div id="profile-orgs" style="margin-top:1rem;"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="stat-total">—</div>
      <div class="stat-label">Total Approved Hours</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-pending">—</div>
      <div class="stat-label">Hours Pending Approval</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-events">—</div>
      <div class="stat-label">Events Attended</div>
    </div>
  </div>

  <!-- Service Log History -->
  <div class="card">
    <div class="card-title">Service Hour History</div>
    <div id="log-loading" class="loading-state"><div class="spinner"></div></div>
    <div id="log-empty" style="display:none;color:var(--gray-600);font-size:.9rem;padding:.5rem 0;">
      No service logs yet. <a href="/events.html">Find an event to attend →</a>
    </div>
    <table class="table" id="log-table" style="display:none;">
      <thead>
        <tr>
          <th>Date</th>
          <th>Event</th>
          <th>Organization</th>
          <th>Hours</th>
          <th>Status</th>
          <th>Note</th>
        </tr>
      </thead>
      <tbody id="log-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Edit profile modal -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <div class="modal-title">Edit profile</div>
    <div class="form-group"><label for="edit-name">Name</label><input id="edit-name" type="text"></div>
    <div class="form-group"><label for="edit-phone">Phone</label><input id="edit-phone" type="tel" placeholder="Optional"></div>
    <div class="form-group"><label for="edit-grade">Grade</label><input id="edit-grade" type="text" placeholder="Optional"></div>
    <div id="profile-modal-error" class="alert alert-error" style="display:none;"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="profile-cancel">Cancel</button>
      <button class="btn btn-primary" id="profile-save">Save</button>
    </div>
  </div>
</div>

<script src="/js/vendor/msal-browser.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/scope.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/pages/dashboard.js"></script>
</body>
</html>
