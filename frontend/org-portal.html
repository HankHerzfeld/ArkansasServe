<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization Portal — Arkansas Serve</title>
  <meta name="description" content="Manage events and log volunteer service hours for your organization on Arkansas Serve.">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2d6a4f">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

<div id="app-header"></div>

<div class="container">
  <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
    <div>
      <h1>Organization Portal</h1>
      <p>Create and manage your volunteer events, then log attendance after each one.</p>
      <div id="scope-bar" style="margin-top:.35rem;"></div>
      <div id="role-actions" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;"></div>
    </div>
    <button class="btn btn-primary" id="btn-new-event">+ New Event</button>
  </div>

  <!-- Event list -->
  <div id="events-loading" class="loading-state"><div class="spinner"></div></div>
  <div id="events-empty" class="card" style="display:none;text-align:center;color:var(--gray-600);">
    You haven't created any events yet. Click <strong>+ New Event</strong> to get started.
  </div>
  <div id="events-list"></div>
</div>

<!-- Create / Edit Event Modal -->
<div class="modal-overlay" id="event-modal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-title" id="event-modal-title">New Event</div>
    <input type="hidden" id="edit-event-id">
    <input type="hidden" id="edit-org-id">
    <div class="form-group">
      <label>Event Title *</label>
      <input type="text" id="evt-title" placeholder="Community Garden Cleanup">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="evt-description" placeholder="What will volunteers be doing?"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label>Start Date & Time *</label>
        <input type="datetime-local" id="evt-start">
      </div>
      <div class="form-group">
        <label>End Date & Time *</label>
        <input type="datetime-local" id="evt-end">
      </div>
    </div>
    <div class="form-group">
      <label>Location *</label>
      <input type="text" id="evt-location" placeholder="123 Main St, Little Rock, AR">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label>Hours Credit</label>
        <input type="number" id="evt-hours" min="0.5" step="0.5" value="2">
      </div>
      <div class="form-group">
        <label>Max Sign-ups (0 = unlimited)</label>
        <input type="number" id="evt-slots" min="0" value="0">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="evt-category">
          <option value="">Select…</option>
          <option>Environmental</option>
          <option>Food Bank</option>
          <option>Tutoring</option>
          <option>Animal Shelter</option>
          <option>Senior Care</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Group (optional)</label>
      <select id="evt-group"><option value="">No group</option></select>
    </div>
    <div class="form-group">
      <label for="evt-tags">Tags (comma-separated, optional)</label>
      <input type="text" id="evt-tags" placeholder="Outdoors, Family-friendly">
    </div>
    <div class="form-group">
      <label for="evt-requirements">What to know / bring (optional)</label>
      <textarea id="evt-requirements" placeholder="Wear closed-toe shoes; water provided."></textarea>
    </div>
    <div class="form-group">
      <label for="evt-external-url">External info link (optional)</label>
      <input type="url" id="evt-external-url" placeholder="https://…">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label for="evt-contact-name">Contact name (optional)</label>
        <input type="text" id="evt-contact-name">
      </div>
      <div class="form-group">
        <label for="evt-contact-email">Contact email (optional)</label>
        <input type="email" id="evt-contact-email">
      </div>
      <div class="form-group">
        <label for="evt-contact-phone">Contact phone (optional)</label>
        <input type="tel" id="evt-contact-phone">
      </div>
    </div>
    <div class="form-group">
      <label>Shifts (optional — volunteers pick one when signing up)</label>
      <div id="evt-shifts" style="display:flex;flex-direction:column;gap:.5rem;"></div>
      <button type="button" class="btn btn-secondary btn-sm" id="evt-add-shift" style="margin-top:.5rem;">+ Add shift</button>
    </div>
    <div class="form-group">
      <label>Sign-up questions (optional)</label>
      <div id="evt-questions" style="display:flex;flex-direction:column;gap:.5rem;"></div>
      <button type="button" class="btn btn-secondary btn-sm" id="evt-add-question" style="margin-top:.5rem;">+ Add question</button>
    </div>
    <div class="form-group">
      <label>Event Photo (optional)</label>
      <input type="file" id="evt-photo" accept="image/*">
      <div id="upload-progress" style="display:none;font-size:.8rem;color:var(--gray-600);margin-top:.4rem;">Uploading…</div>
    </div>
    <input type="hidden" id="evt-photo-blob">
    <div id="event-form-error" class="alert alert-error" style="display:none;"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="event-modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="event-modal-save">Save Event</button>
    </div>
  </div>
</div>

<!-- Log Hours Modal -->
<div class="modal-overlay" id="log-modal">
  <div class="modal" style="max-width:580px;">
    <div class="modal-title">Log Attendance &amp; Hours</div>
    <p style="color:var(--gray-600);font-size:.85rem;margin-bottom:1rem;" id="log-event-name"></p>
    <div id="log-roster-loading" class="loading-state"><div class="spinner"></div></div>
    <table class="table" id="log-roster-table" style="display:none;">
      <thead>
        <tr>
          <th>Student</th>
          <th>School</th>
          <th>Attended?</th>
          <th>Hours</th>
        </tr>
      </thead>
      <tbody id="log-roster-tbody"></tbody>
    </table>
    <div id="log-error" class="alert alert-error" style="display:none;margin-top:.75rem;"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="log-modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="log-modal-submit">Submit Hours</button>
    </div>
  </div>
</div>

<script src="/js/vendor/msal-browser.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/scope.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/pages/org-portal.js"></script>
</body>
</html>
