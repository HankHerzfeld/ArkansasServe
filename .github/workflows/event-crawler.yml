name: Daily Event Crawler

# ⚠️ SCHEDULE DISABLED (2026-07-14) — manual runs only.
#
# Why: the crawl endpoint (/manage/events/crawl) authenticates through
# AuthMiddleware.ValidateRequest, i.e. it expects a real **Entra JWT**. Entra access
# tokens expire in about an hour, so CRAWLER_SERVICE_TOKEN — a static value pasted into
# a GitHub secret — cannot drive a daily job: it would 401 by the next morning even once
# set. The secret was never set, so every scheduled run failed at the validate step
# ("CRAWLER_SERVICE_TOKEN secret is not set"), mailing a failure daily for no benefit.
#
# The schedule stays off until machine-to-machine auth is settled. The real options are
# an Entra app registration + client_credentials (mint a fresh token per run; needs
# AuthMiddleware to accept app tokens), a dedicated shared-secret header for this one
# route, or moving the schedule into a timer-triggered Function. Re-enable the cron
# below once one is in place — the job body itself is fine and unchanged.
#
# workflow_dispatch still works for a one-off run IF a currently-valid token is supplied.
#
# Prerequisites (set in GitHub repo Settings → Secrets and variables → Actions):
#   CRAWLER_ENDPOINT_URL  — e.g. https://your-swa.azurestaticapps.net/api
#   CRAWLER_SERVICE_TOKEN — a bearer token for a PlatformAdmin/SuperAdmin account
#                           (see the expiry caveat above)

on:
  # schedule:
  #   # Daily at 11:00 UTC (6 AM CT)
  #   - cron: '0 11 * * *'
  #   # Extra full-pull on Sundays at 12:00 UTC (7 AM CT)
  #   - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated source list (leave blank for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — fetch but do not persist'
        type: boolean
        required: false
        default: false

jobs:
  crawl:
    name: Crawl external event sources
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No repository permissions needed — this job only calls an external HTTP endpoint.
    permissions: {}

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.CRAWLER_ENDPOINT_URL }}" ]; then
            echo "::error::CRAWLER_ENDPOINT_URL secret is not set. Skipping crawl."
            exit 1
          fi
          if [ -z "${{ secrets.CRAWLER_SERVICE_TOKEN }}" ]; then
            echo "::error::CRAWLER_SERVICE_TOKEN secret is not set. Skipping crawl."
            exit 1
          fi

      - name: Build request body
        id: body
        run: |
          # Determine sources array from input (workflow_dispatch) or run all.
          SOURCES_INPUT="${{ github.event.inputs.sources }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          # Build the JSON body with jq (preinstalled on ubuntu-latest). For the sources list,
          # split the comma-separated input, trim whitespace, and drop empty entries.
          if [ -n "$SOURCES_INPUT" ]; then
            BODY=$(jq -cn --arg s "$SOURCES_INPUT" --argjson dry "$DRY_RUN" \
              '{sources: ($s | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))), dryRun: $dry}')
          else
            BODY=$(jq -cn --argjson dry "$DRY_RUN" '{sources: null, dryRun: $dry}')
          fi

          echo "body=$BODY" >> "$GITHUB_OUTPUT"
          echo "Payload: $BODY"

      - name: Trigger crawl
        id: crawl
        env:
          CRAWLER_TOKEN: ${{ secrets.CRAWLER_SERVICE_TOKEN }}
        run: |
          BASE_URL="${{ secrets.CRAWLER_ENDPOINT_URL }}"
          # Trim trailing slash
          BASE_URL="${BASE_URL%/}"

          HTTP_RESPONSE=$(curl --silent --show-error --fail-with-body \
            --max-time 600 \
            --write-out "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRAWLER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '${{ steps.body.outputs.body }}' \
            "${BASE_URL}/manage/events/crawl")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $HTTP_BODY"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Crawl request failed with status $HTTP_STATUS"
            exit 1
          fi

          # Parse and summarise results with jq (fall back to "?" if the body isn't valid JSON).
          IMPORTED=$(echo "$HTTP_BODY" | jq -r '.imported // 0'          2>/dev/null || echo "?")
          SKIPPED=$(echo "$HTTP_BODY"  | jq -r '.skipped // 0'           2>/dev/null || echo "?")
          ERRORS=$(echo "$HTTP_BODY"   | jq -r '(.errors // []) | length' 2>/dev/null || echo "?")

          echo "::notice::Crawl complete — imported: $IMPORTED, skipped: $SKIPPED, errors: $ERRORS"
          echo "imported=$IMPORTED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED"   >> "$GITHUB_OUTPUT"
          echo "errors=$ERRORS"     >> "$GITHUB_OUTPUT"

      - name: Report summary
        if: always()
        run: |
          echo "## 🕷️ Event Crawler Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Imported | ${{ steps.crawl.outputs.imported || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skipped (duplicates) | ${{ steps.crawl.outputs.skipped || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Errors | ${{ steps.crawl.outputs.errors || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Newly imported events are in **Draft** status and must be reviewed by a SuperAdmin in the Admin Backend → Event Crawler queue before they become visible to students." >> "$GITHUB_STEP_SUMMARY"
