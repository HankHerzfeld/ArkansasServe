name: Daily Event Crawler

# Schedule RE-ENABLED 2026-07-15, now that M2M auth is settled.
#
# History: this ran on a static CRAWLER_SERVICE_TOKEN in a GitHub secret, against an
# endpoint that validates an **Entra JWT**. Those expire in ~1h, so a static token could
# never drive a daily job — it would 401 by the next morning even if set. It was never
# set, so every scheduled run failed at the validate step and mailed a failure daily for
# no benefit. The schedule was disabled 2026-07-14 pending a decision.
#
# Resolution (owner decision, 2026-07-15): a **shared-secret header** scoped to this one
# route. The endpoint now accepts `X-Crawler-Secret` as an alternative to a JWT — see
# CrawlerFunctions / AuthConfig.CrawlerSharedSecret. A static secret works here precisely
# because it is not a token: nothing expires.
#
# The two paths this was chosen over, recorded so the trade-off is not re-litigated blind:
# an Entra app registration + client_credentials (correct M2M, but a client secret that
# itself needs rotating, and the route stays public), or a timer-triggered Function (no
# secret at all, but the crawler leaves this repo). The header is weaker than both; it is
# bounded by the fact that the crawl route only creates **Draft** events, which a human
# must review and publish through the JWT-only routes before students see anything.
#
# ── Setup (BOTH must match, or every run 401s) ────────────────────────────────
#   1. GitHub → Settings → Secrets and variables → Actions:
#        CRAWLER_ENDPOINT_URL  — e.g. https://arkansasserve.com/api
#        CRAWLER_SHARED_SECRET — the shared secret (generate: openssl rand -base64 48)
#   2. Azure → Function App `func-arkansas-serve-arksrv` → app settings:
#        Crawler__SharedSecret — the SAME value
#
#   The app setting is optional by design: leave it unset and the header path does not
#   exist at all (the endpoint stays JWT-only and this workflow 401s). It is NOT declared
#   in infra/main.bicep — that template is non-authoritative and must not be applied; see
#   infra/README.md. Set it directly on the Function App.
#
#   To revoke: clear Crawler__SharedSecret on the Function App. That kills the path
#   immediately and needs no redeploy.
#
# The old CRAWLER_SERVICE_TOKEN secret is unused as of this change and can be deleted.

on:
  schedule:
    # Daily at 11:00 UTC (6 AM CT)
    - cron: '0 11 * * *'
    # Extra full-pull on Sundays at 12:00 UTC (7 AM CT)
    - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated source list (leave blank for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — fetch but do not persist'
        type: boolean
        required: false
        default: false

jobs:
  crawl:
    name: Crawl external event sources
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No repository permissions needed — this job only calls an external HTTP endpoint.
    permissions: {}

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.CRAWLER_ENDPOINT_URL }}" ]; then
            echo "::error::CRAWLER_ENDPOINT_URL secret is not set. Skipping crawl."
            exit 1
          fi
          if [ -z "${{ secrets.CRAWLER_SHARED_SECRET }}" ]; then
            echo "::error::CRAWLER_SHARED_SECRET secret is not set. Skipping crawl."
            echo "::error::It must match the Crawler__SharedSecret app setting on the Function App."
            exit 1
          fi

      - name: Build request body
        id: body
        run: |
          # Determine sources array from input (workflow_dispatch) or run all.
          SOURCES_INPUT="${{ github.event.inputs.sources }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          # Build the JSON body with jq (preinstalled on ubuntu-latest). For the sources list,
          # split the comma-separated input, trim whitespace, and drop empty entries.
          if [ -n "$SOURCES_INPUT" ]; then
            BODY=$(jq -cn --arg s "$SOURCES_INPUT" --argjson dry "$DRY_RUN" \
              '{sources: ($s | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))), dryRun: $dry}')
          else
            BODY=$(jq -cn --argjson dry "$DRY_RUN" '{sources: null, dryRun: $dry}')
          fi

          echo "body=$BODY" >> "$GITHUB_OUTPUT"
          echo "Payload: $BODY"

      - name: Trigger crawl
        id: crawl
        env:
          CRAWLER_SECRET: ${{ secrets.CRAWLER_SHARED_SECRET }}
        run: |
          BASE_URL="${{ secrets.CRAWLER_ENDPOINT_URL }}"
          # Trim trailing slash
          BASE_URL="${BASE_URL%/}"

          # The secret goes in X-Crawler-Secret, not Authorization: the endpoint reads a
          # bearer token as an Entra JWT and would reject this value as a malformed one.
          # Passed via env and referenced as a variable so it is never rendered into the
          # command line (where it would reach the process list and the run log).
          HTTP_RESPONSE=$(curl --silent --show-error --fail-with-body \
            --max-time 600 \
            --write-out "\n%{http_code}" \
            -X POST \
            -H "X-Crawler-Secret: ${CRAWLER_SECRET}" \
            -H "Content-Type: application/json" \
            -d '${{ steps.body.outputs.body }}' \
            "${BASE_URL}/manage/events/crawl")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $HTTP_BODY"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Crawl request failed with status $HTTP_STATUS"
            exit 1
          fi

          # Parse and summarise results with jq (fall back to "?" if the body isn't valid JSON).
          IMPORTED=$(echo "$HTTP_BODY" | jq -r '.imported // 0'          2>/dev/null || echo "?")
          SKIPPED=$(echo "$HTTP_BODY"  | jq -r '.skipped // 0'           2>/dev/null || echo "?")
          ERRORS=$(echo "$HTTP_BODY"   | jq -r '(.errors // []) | length' 2>/dev/null || echo "?")

          echo "::notice::Crawl complete — imported: $IMPORTED, skipped: $SKIPPED, errors: $ERRORS"
          echo "imported=$IMPORTED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED"   >> "$GITHUB_OUTPUT"
          echo "errors=$ERRORS"     >> "$GITHUB_OUTPUT"

      - name: Report summary
        if: always()
        run: |
          echo "## 🕷️ Event Crawler Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Imported | ${{ steps.crawl.outputs.imported || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skipped (duplicates) | ${{ steps.crawl.outputs.skipped || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Errors | ${{ steps.crawl.outputs.errors || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Newly imported events are in **Draft** status and must be reviewed by a SuperAdmin in the Admin Backend → Event Crawler queue before they become visible to students." >> "$GITHUB_STEP_SUMMARY"
