# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core app to Azure Function App - func-arkansas-serve-arksrv

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PROJECT_PATH: 'backend/ArkansasServe.Functions' # the Functions project to build
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Build and publish the Functions project'
        shell: pwsh
        run: dotnet publish '${{ env.AZURE_FUNCTIONAPP_PROJECT_PATH }}' --configuration Release --output ./output
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_72ACD1D6DC1C4BAC905DA26F9E7FDBDA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F94139D8B024EC2A2B5F38E65B5ADB5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6DB21F4C49624AF780AF7A5E6F6E1586 }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'func-arkansas-serve-arksrv'
          slot-name: 'Production'
          package: './output'
          